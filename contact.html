<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cars World - Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">

</head>

<body class="contact-theme">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand">Cars World</a>

    <div>
      <a class="nav-link d-inline text-white" href="index.html">Home</a>
      <a class="nav-link d-inline text-white" href="gallery.html">Gallery</a>
      <a class="nav-link d-inline text-white" href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-center">Contact Us</h2>

  <form onsubmit="return submitForm()">

    <div class="mb-3">
      <label>Name</label>
      <input type="text" class="form-control" id="name" required>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" id="email" required>
    </div>

    <div class="mb-3">
      <label>Message</label>
      <textarea class="form-control" id="message"></textarea>
    </div>

    <button class="btn btn-success">Send</button>
  </form>

</div>

<script src="script.js"></script>
</body>
</html>
